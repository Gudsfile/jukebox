name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
          - major-dev
          - minor-dev
          - patch-dev
          - dev
          - stable
        default: dev

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    name: Run Tests & Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Check format with ruff
        run: uv run ruff format --check

      - name: Lint with ruff
        run: uv run ruff check

      - name: Test with pytest
        run: uv run pytest

      - name: Type check with ty
        run: uv run ty check --output-format github

  publish:
    name: Bump, Tag & Publish
    needs: test
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.CLIENT_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Get app user ID
        id: user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Assert release branch is main
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "Release must be dispatched from main, got: ${{ github.ref_name }}"
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Bump version
        run: |
          case "${{ github.event.inputs.bump }}" in
            major-dev)  uv version --bump major --bump dev ;;
            minor-dev)  uv version --bump minor --bump dev ;;
            patch-dev)  uv version --bump patch --bump dev ;;
            *)          uv version --bump ${{ github.event.inputs.bump }} ;;
          esac

      - name: Get version
        id: version
        run: echo "version=$(uv version --short)" >> $GITHUB_OUTPUT

      - name: Commit, push & tag
        run: |
          git config user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config user.email '${{ steps.user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          git add pyproject.toml uv.lock
          git commit -m "🔖 v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD:${{ github.ref_name }} "v${{ steps.version.outputs.version }}"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish

      - name: Create GitHub Release
        if: "!contains(steps.version.outputs.version, '.dev')"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            dist/*
