name: release

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (no actual publish)"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to PyPI & GitHub
    runs-on: ubuntu-latest
    environment: prod
    if: |
      github.event_name == 'workflow_dispatch'
      || (
        github.event_name == 'workflow_run'
        && github.event.workflow_run.conclusion == 'success'
        && startsWith(github.event.workflow_run.head_commit.message, '🔖 v')
      )

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || '' }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Download artifact from CI
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ github.event.workflow_run.id }}
          name: built-package
          path: dist/

      - name: Build package
        if: github.event_name == 'workflow_dispatch'
        run: uv build

      - name: Publish to PyPI
        run: uv publish ${{ github.event.inputs.dry-run == 'true' && '--dry-run' || '' }}

      - name: Get version
        id: version
        run: echo "version=$(uv version --short)" >> $GITHUB_OUTPUT

      - name: Tag & GitHub Release
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
          if ! echo "${{ steps.version.outputs.version }}" | grep -q '\.dev'; then
            gh release create "v${{ steps.version.outputs.version }}" \
              --title "v${{ steps.version.outputs.version }}" \
              --generate-notes \
              dist/*
          fi
