name: release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  id-token: write

env:
  UV_PROJECT_ENVIRONMENT: $pythonLocation

jobs:
  build-and-publish:
    name: Build & Publish to PyPI
    runs-on: ubuntu-latest
    outputs:
      is_stable: ${{ steps.check-stable.outputs.is_stable }}
    if: |
      github.event.pull_request.merged == true
      && startsWith(github.head_ref, 'auto-bump/')
      && github.event.pull_request.user.login == 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: built-package
          path: dist/

      - name: Check if stable release
        id: check-stable
        run: |
          if uv version --short | grep -q '\.dev'; then
            echo "is_stable=false" >> $GITHUB_OUTPUT
          else
            echo "is_stable=true" >> $GITHUB_OUTPUT
          fi

  github-release:
    name: Create GitHub Release
    needs: build-and-publish
    runs-on: ubuntu-latest
    if: needs.build-and-publish.outputs.is_stable == 'true'

    steps:
      - uses: actions/checkout@v6

      - name: Download built package
        uses: actions/download-artifact@v8
        with:
          name: built-package
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Get version
        id: version
        run: echo "version=$(uv version --short)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            dist/*
