name: bump-version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
          - major-dev
          - minor-dev
          - patch-dev
          - dev
          - stable
        default: dev

permissions:
  contents: write

env:
  UV_PROJECT_ENVIRONMENT: $pythonLocation

jobs:
  bump:
    name: Bump Version
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Get app user ID
        id: user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Bump version
        run: |
          case "${{ github.event.inputs.bump }}" in
            major-dev)  uv version --bump major --bump dev ;;
            minor-dev)  uv version --bump minor --bump dev ;;
            patch-dev)  uv version --bump patch --bump dev ;;
            *)          uv version --bump ${{ github.event.inputs.bump }} ;;
          esac

      - name: Get new version
        id: version
        run: echo "version=$(uv version --short)" >> $GITHUB_OUTPUT

      - name: Commit and push to main
        run: |
          git config user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config user.email '${{ steps.user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          git add pyproject.toml uv.lock
          git commit -m "🔖 v${{ steps.version.outputs.version }}"
          git push origin HEAD:${{ github.ref_name }}
