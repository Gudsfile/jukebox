name: bump-version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
          - major-dev
          - minor-dev
          - patch-dev
          - dev
          - stable
        default: dev

permissions:
  contents: write
  pull-requests: write

env:
  UV_PROJECT_ENVIRONMENT: $pythonLocation

jobs:
  bump:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Bump version
        run: |
          case "${{ github.event.inputs.bump }}" in
            major-dev)  uv version --bump major --bump dev ;;
            minor-dev)  uv version --bump minor --bump dev ;;
            patch-dev)  uv version --bump patch --bump dev ;;
            *)          uv version --bump ${{ github.event.inputs.bump }} ;;
          esac

      - name: Get new version
        id: version
        run: echo "version=$(uv version --short)" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml uv.lock
          git commit -m "🔖 v${{ steps.version.outputs.version }}"
          git push origin HEAD:auto-bump/v${{ steps.version.outputs.version }}
          gh pr create \
            --head auto-bump/v${{ steps.version.outputs.version }} \
            --title "🔖 v${{ steps.version.outputs.version }}" \
            --body $'Automated version bump to v${{ steps.version.outputs.version }}\n\nThis PR was created by the bump-version workflow.'

      - name: Approve and enable auto-merge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr review auto-bump/v${{ steps.version.outputs.version }} --approve
          gh pr merge --auto --merge auto-bump/v${{ steps.version.outputs.version }}
